# .github/workflows/build-android.yml
name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            target: android-arm64
          - arch: armeabi-v7a
            target: android-arm
          - arch: x86_64
            target: android-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      # 修正点：使用 'stable' 自动获取最新稳定版，或指定有效版本如 '3.24.0'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'stable'   # 自动获取最新稳定版
          cache: true

      - name: Setup Go (如果需要)
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache-dependency-path: core/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config cmake

      - name: Get Flutter packages
        run: flutter pub get

      - name: Run setup.dart (if exists)
        run: |
          if [ -f "setup.dart" ]; then
            dart setup.dart android --arch ${{ matrix.arch }}
          else
            echo "setup.dart not found, skipping."
          fi

      - name: Build APK for ${{ matrix.arch }}
        run: |
          cd android
          ./gradlew clean
          flutter build apk --release --target-platform ${{ matrix.target }} --split-per-abi

      - name: Build universal APK (only for arm64-v8a)
        if: matrix.arch == 'arm64-v8a'
        run: |
          cd android
          flutter build apk --release

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          
          find android/app/build/outputs/apk -name "*.apk" -type f | while read apk; do
            if [[ "$apk" == *"arm64-v8a"* ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-arm64-v8a.apk"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-armeabi-v7a.apk"
            elif [[ "$apk" == *"x86_64"* ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-x86_64.apk"
            elif [[ "$apk" == "app-release.apk" ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-universal.apk"
            else
              cp "$apk" "dist/"
            fi
          done
          
          find android/app/build/outputs/bundle -name "*.aab" -type f | while read aab; do
            if [[ "$aab" == *"release"* ]]; then
              cp "$aab" "dist/Bettbox-${VERSION}-android.aab"
            fi
          done
          
          echo "Collected files:"
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bettbox-android-${{ matrix.arch }}
          path: dist/
          compression-level: 9
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: bettbox-android-*
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts/ -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release_files/ \;
          echo "Release files:"
          ls -la release_files/

      - name: Generate release notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cat > release_notes.md << EOF
          # Bettbox v${VERSION}

          ## 下载说明
          - **arm64-v8a**：绝大多数现代 Android 设备（推荐）
          - **armeabi-v7a**：较旧的 32 位设备
          - **x86_64**：x86 架构设备（模拟器）
          - **universal**：通用包（体积较大）
          - **.aab**：用于 Google Play 发布

          ## 更新内容
          - 自动构建 Android 版本
          - 修复与改进
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release_files/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'pre') }}
