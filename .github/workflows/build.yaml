name: build

on:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  SHOULD_RELEASE: ${{ !contains(github.ref, '-') || contains(github.ref_name, 'pre') }}
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, amd64, arm, universal]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-android-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: '3.44.5'

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Get Flutter Dependencies
        run: |
          flutter pub get
          dart run build_runner build -d

      - name: Build Android APK
        run: |
          # 构建特定架构的 APK
          cd android
          if [ "${{ matrix.arch }}" == "universal" ]; then
            ./gradlew assembleRelease
          else
            # 使用 abiFilters 构建特定架构
            flutter build apk --release --target-platform android-${{ matrix.arch == 'arm64' && 'arm64' || matrix.arch == 'amd64' && 'x64' || matrix.arch == 'arm' && 'arm' || 'android' }} --split-per-abi
          fi

      - name: Build Android App Bundle
        run: |
          cd android
          if [ "${{ matrix.arch }}" == "universal" ]; then
            ./gradlew bundleRelease
          fi

      - name: Prepare Dist Directory
        run: |
          mkdir -p dist
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Collect APK Files
        run: |
          VERSION="${{ env.VERSION }}"
          APK_DIR="android/app/build/outputs/apk/release"
          AAB_DIR="android/app/build/outputs/bundle/release"
          
          # 处理 APK 文件
          if [ -d "$APK_DIR" ]; then
            for apk in "$APK_DIR"/*.apk; do
              if [ -f "$apk" ]; then
                # 根据文件名判断架构
                if [[ "$apk" == *"arm64"* ]]; then
                  ARCH="arm64"
                elif [[ "$apk" == *"x86_64"* ]] || [[ "$apk" == *"x64"* ]]; then
                  ARCH="amd64"
                elif [[ "$apk" == *"armeabi"* ]]; then
                  ARCH="arm"
                else
                  ARCH="${{ matrix.arch }}"
                fi
                cp "$apk" "dist/Bettbox-${VERSION}-android-${ARCH}.apk"
              fi
            done
          fi
          
          # 如果没有找到分架构的 APK，说明是 universal
          if [ ! "$(ls -A dist/*.apk 2>/dev/null)" ] && [ -f "$APK_DIR/app-release.apk" ]; then
            cp "$APK_DIR/app-release.apk" "dist/Bettbox-${VERSION}-android-universal.apk"
          fi
          
          # 处理 AAB 文件
          if [ -f "$AAB_DIR/app-release.aab" ]; then
            cp "$AAB_DIR/app-release.aab" "dist/Bettbox-${VERSION}-android-universal.aab"
          fi

      - name: Fallback APK Collection
        if: always()
        run: |
          VERSION="${{ env.VERSION }}"
          # 如果 dist 为空，尝试直接复制
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No APK files found, trying fallback..."
            APK_DIR="android/app/build/outputs/apk/release"
            if [ -f "$APK_DIR/app-release.apk" ]; then
              cp "$APK_DIR/app-release.apk" "dist/Bettbox-${VERSION}-android-${{ matrix.arch }}.apk"
            fi
          fi

      - name: List Built Files
        run: |
          echo "Built files:"
          find android/app/build/outputs -name "*.apk" -o -name "*.aab" | sort
          echo ""
          echo "Dist directory:"
          ls -la dist/ || echo "No files in dist"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Bettbox-android-${{ matrix.arch }}
          path: ./dist
          compression-level: 9
          overwrite: true
          retention-days: 30

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./all-artifacts/
          pattern: Bettbox-android-*
          merge-multiple: true

      - name: Organize Release Files
        run: |
          mkdir -p dist
          # 移动所有文件到 dist
          if [ -d "./all-artifacts" ]; then
            find ./all-artifacts -type f -name "*.apk" -o -name "*.aab" | while read file; do
              mv "$file" ./dist/
            done
          fi
          echo "Files ready for release:"
          ls -la ./dist/

      - name: Generate release.md
        run: |
          echo "## Changelog" > release.md
          echo "" >> release.md
          echo "- Android build for version ${{ github.ref_name }}" >> release.md
          echo "- Fixes and improvements" >> release.md
          echo "- 具体变更参考最新 Commits" >> release.md

      - name: Create Release
        if: ${{ env.SHOULD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          generate_release_notes: false
