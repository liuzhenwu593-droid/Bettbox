# .github/workflows/build-android.yml
name: Build Android

on:
  push:
    tags:
      - 'v*'                # 推送 v 开头的标签时触发
  workflow_dispatch:        # 允许在 Actions 页面手动触发

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 定义要构建的架构
        include:
          - arch: arm64-v8a
            target: android-arm64
          - arch: armeabi-v7a
            target: android-arm
          - arch: x86_64
            target: android-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.4'   # 使用稳定的 Flutter 版本
          cache: true

      - name: Setup Go (如果需要)
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache-dependency-path: core/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config cmake

      - name: Get Flutter packages
        run: flutter pub get

      - name: Build APK for ${{ matrix.arch }}
        run: |
          cd android
          ./gradlew clean
          # 使用 --split-per-abi 为每个架构生成独立的 APK
          flutter build apk --release --target-platform ${{ matrix.target }} --split-per-abi

      - name: Build universal APK (only for arm64-v8a to avoid duplication)
        if: matrix.arch == 'arm64-v8a'
        run: |
          cd android
          flutter build apk --release

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          
          # 查找所有生成的 APK
          find android/app/build/outputs/apk -name "*.apk" -type f | while read apk; do
            # 根据文件名确定架构
            if [[ "$apk" == *"arm64-v8a"* ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-arm64-v8a.apk"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-armeabi-v7a.apk"
            elif [[ "$apk" == *"x86_64"* ]]; then
              cp "$apk" "dist/Bettbox-${VERSION}-android-x86_64.apk"
            elif [[ "$apk" == "app-release.apk" ]]; then
              # 通用 APK
              cp "$apk" "dist/Bettbox-${VERSION}-android-universal.apk"
            else
              # 其他情况，按原样复制
              cp "$apk" "dist/"
            fi
          done
          
          # 查找 AAB（如果有）
          find android/app/build/outputs/bundle -name "*.aab" -type f | while read aab; do
            if [[ "$aab" == *"release"* ]]; then
              cp "$aab" "dist/Bettbox-${VERSION}-android.aab"
            fi
          done
          
          echo "Collected files:"
          ls -la dist/

      - name: Upload artifacts (for debugging)
        uses: actions/upload-artifact@v6
        with:
          name: bettbox-android-${{ matrix.arch }}
          path: dist/
          compression-level: 9
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 仅在标签推送时执行（手动触发不会执行 release）
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: bettbox-android-*
          merge-multiple: true

      - name: Prepare release files
        run: |
          mkdir -p release_files
          # 将所有 APK 和 AAB 复制到 release_files
          find artifacts/ -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release_files/ \;
          echo "Release files:"
          ls -la release_files/

      - name: Generate release notes
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cat > release_notes.md << EOF
          # Bettbox v${VERSION}

          ## 下载说明
          请根据您的设备 CPU 架构选择对应的 APK：
          - **arm64-v8a**：绝大多数现代 Android 设备（推荐）
          - **armeabi-v7a**：较旧的 32 位设备
          - **x86_64**：x86 架构设备（主要用于模拟器）
          - **universal**：通用包（包含所有架构，体积较大）

          如需上传 Google Play，请使用 **.aab** 文件。

          ## 更新内容
          - 自动构建 Android 版本
          - 修复与改进
          - 具体变更请查看 Git 提交记录
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release_files/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'pre') }}
          generate_release_notes: false
